name: Update GAMEUPDATES

on:
  push:
    branches:
      - GAMEUPDATES
      - main

concurrency:
  group: update-gameupdates-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Get the date message
      id: msg
      run: echo "msg=$(date +'%Y-%m-%d') game updates" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update GAMEUPDATES
      run: |
        curl -fsSL https://raw.githubusercontent.com/darwintree/sc-viewer-v2/GAMEUPDATES/GAMEUPDATES.md -o GAMEUPDATES.md

    - name: Commit and push to main
      run: |
        if git diff --quiet -- GAMEUPDATES.md; then
          echo "No GAMEUPDATES.md changes to push."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add GAMEUPDATES.md
        git commit -m "${{ steps.msg.outputs.msg }}"
        git push origin HEAD:main
